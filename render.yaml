services:
  # ─── Backend API (Hono / Node.js) ──────────────────────────────
  - type: web
    name: bankai-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: >
      npm install -g pnpm@10.32.1 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @kaneo/permissions build &&
      pnpm --filter @kaneo/email build &&
      pnpm --filter @kaneo/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.20.2"
      - key: NODE_ENV
        value: production
      - key: KANEO_API_URL
        sync: false
      - key: KANEO_CLIENT_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NOTIFICATION_SECRET_ENCRYPTION_KEY
        sync: false
      - key: UPLOADCARE_PUBLIC_KEY
        sync: false
      - key: UPLOADCARE_SECRET_KEY
        sync: false

  # ─── Frontend Web (Vite SPA / React) ───────────────────────────
  - type: web
    runtime: static
    name: bankai-web
    buildCommand: >
      npm install -g pnpm@10.32.1 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @kaneo/permissions build &&
      pnpm --filter @kaneo/web build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.20.2"
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLIENT_URL
        sync: false
      - key: VITE_TURNSTILE_SITE_KEY
        value: ""

  # ─── Landing Page (Next.js SSG) ────────────────────────────────
  - type: web
    runtime: static
    name: bankai-site
    buildCommand: >
      npm install -g pnpm@10.32.1 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @kaneo/site build
    staticPublishPath: apps/site/out
    envVars:
      - key: NODE_VERSION
        value: "20.20.2"
